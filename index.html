<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>para tú</title>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@1,300;1,400;1,500&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #f2ebe2;
      width: 100vw;
      height: 100vh;
      overflow: hidden;
      cursor: none;
      font-family: 'Cormorant Garamond', serif;
    }

    /* Cursor personalizado */
    #cursor {
      position: fixed;
      width: 10px;
      height: 10px;
      background: #e8737a;
      border-radius: 50%;
      pointer-events: none;
      transform: translate(-50%, -50%);
      z-index: 9999;
      transition: transform 0.1s ease;
      mix-blend-mode: multiply;
    }

    /* Canvas partículas */
    #particles {
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      pointer-events: none;
      z-index: 1;
    }

    /* Jardín */
    #garden {
      position: relative;
      width: 100vw;
      height: 100vh;
    }

    /* Texto central */
    .title {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      font-size: clamp(4rem, 10vw, 9rem);
      font-style: italic;
      font-weight: 300;
      color: #2c2416;
      letter-spacing: 0.05em;
      z-index: 10;
      user-select: none;
      text-align: center;
      line-height: 1;
      transition: letter-spacing 0.8s ease;
    }
    .title.glow {
      letter-spacing: 0.12em;
      text-shadow: 0 0 40px rgba(232, 115, 122, 0.3);
    }

    /* Contenedor de cada flor */
    .flower-wrap {
      position: absolute;
      transform-origin: bottom center;
      z-index: 5;
      pointer-events: none;
    }

    /* SVG flor */
    .flower-wrap svg {
      display: block;
      overflow: visible;
    }

    /* Pétalos: estado inicial colapsado */
    .petals-group {
      transform-origin: center;
      transform: scale(0);
      opacity: 0;
      transition:
        transform 0.7s cubic-bezier(0.34, 1.56, 0.64, 1),
        opacity 0.5s ease;
    }

    .petal {
      transform-origin: center bottom;
      transition: transform 0.6s cubic-bezier(0.34, 1.56, 0.64, 1);
    }

    /* Estado florecido */
    .flower-wrap.bloomed .petals-group {
      transform: scale(1);
      opacity: 1;
    }

    /* Partícula pétalo flotante */
    @keyframes floatPetal {
      0%   { transform: translate(0,0) rotate(0deg) scale(1); opacity: 0.8; }
      100% { transform: translate(var(--tx), var(--ty)) rotate(var(--tr)) scale(0); opacity: 0; }
    }

    .float-petal {
      position: fixed;
      width: 8px;
      height: 10px;
      border-radius: 50% 50% 50% 0;
      pointer-events: none;
      z-index: 20;
      animation: floatPetal 1.8s ease-out forwards;
    }
  </style>
</head>
<body>

<div id="cursor"></div>
<canvas id="particles"></canvas>

          style="transform-origin:0px 0px; transform:rotate(270deg)"/>
        <ellipse cx="0" cy="-16" rx="8" ry="14" fill="none" stroke="#2c2416" stroke-width="0.8" opacity="0.4"
          style="transform-origin:0px 0px; transform:rotate(0deg)"/>
        <ellipse cx="0" cy="-16" rx="8" ry="14" fill="none" stroke="#2c2416" stroke-width="0.8" opacity="0.4"
          style="transform-origin:0px 0px; transform:rotate(90deg)"/>
        <ellipse cx="0" cy="-16" rx="8" ry="14" fill="none" stroke="#2c2416" stroke-width="0.8" opacity="0.4"
          style="transform-origin:0px 0px; transform:rotate(180deg)"/>
        <ellipse cx="0" cy="-16" rx="8" ry="14" fill="none" stroke="#2c2416" stroke-width="0.8" opacity="0.4"
          style="transform-origin:0px 0px; transform:rotate(270deg)"/>
        <circle cx="0" cy="0" r="5" fill="#f4a261"/>
        <circle cx="0" cy="0" r="3" fill="#e8873a"/>
      </g>
      <circle cx="32" cy="53" r="4" fill="none" stroke="#2c2416" stroke-width="1.1"/>
    </svg>
  </div>

  <!-- BOTONES PEQUEÑOS decorativos (siempre visibles) -->
  <!-- Conjunto izq-centro -->
  <div style="position:absolute; left:15%; bottom:32%; pointer-events:none; z-index:3;">
    <svg viewBox="0 0 60 90" width="60" height="90">
      <path d="M10 90 C10 75 11 60 12 45" stroke="#2c2416" stroke-width="1.2" fill="none" stroke-linecap="round"/>
      <circle cx="12" cy="42" r="4" fill="none" stroke="#2c2416" stroke-width="1.2"/>
      <path d="M25 90 C25 70 26 55 27 38" stroke="#2c2416" stroke-width="1.2" fill="none" stroke-linecap="round"/>
      <circle cx="27" cy="35" r="4" fill="none" stroke="#2c2416" stroke-width="1.2"/>
      <path d="M40 90 C40 78 41 65 42 52" stroke="#2c2416" stroke-width="1.2" fill="none" stroke-linecap="round"/>
      <circle cx="42" cy="49" r="4" fill="none" stroke="#2c2416" stroke-width="1.2"/>
      <!-- hoja decorativa -->
      <path d="M12 70 C2 62 0 52 8 48 C10 58 11 64 12 70Z" stroke="#2c2416" stroke-width="1.1" fill="none"/>
    </svg>
  </div>

  <!-- Texto "para tú" -->
  <h1 class="title" id="title">para tú</h1>

</div><!-- fin garden -->

<script>
  // ── Cursor personalizado ──────────────────────────────────────────
  const cursor = document.getElementById('cursor');
  let mx = -200, my = -200;

  document.addEventListener('mousemove', (e) => {
    mx = e.clientX;
    my = e.clientY;
    cursor.style.left = mx + 'px';
    cursor.style.top  = my + 'px';
    checkBlooms();
    checkTitle();
  });

  // ── Flores: bloom por proximidad ──────────────────────────────────
  const flowers = document.querySelectorAll('.flower-wrap[data-bloom-r]');

  function getFlowerCenter(el) {
    const rect = el.getBoundingClientRect();
    return {
      x: rect.left + rect.width / 2,
      y: rect.top  + rect.height * 0.45   // aprox centro del capullo
    };
  }

  function checkBlooms() {
    flowers.forEach(fl => {
      const r   = parseFloat(fl.dataset.bloomR);
      const c   = getFlowerCenter(fl);
      const dx  = mx - c.x;
      const dy  = my - c.y;
      const dist = Math.sqrt(dx*dx + dy*dy);

      if (dist < r) {
        if (!fl.classList.contains('bloomed')) {
          fl.classList.add('bloomed');
          spawnPetals(c.x, c.y, fl);
        }
      } else {
        fl.classList.remove('bloomed');
      }
    });
  }

  // ── Título: glow al acercarse ─────────────────────────────────────
  const title = document.getElementById('title');

  function checkTitle() {
    const rect = title.getBoundingClientRect();
    const cx = rect.left + rect.width  / 2;
    const cy = rect.top  + rect.height / 2;
    const dist = Math.sqrt((mx-cx)**2 + (my-cy)**2);
    if (dist < 160) {
      title.classList.add('glow');
    } else {
      title.classList.remove('glow');
    }
  }

  // ── Pétalos flotantes al florecer ─────────────────────────────────
  const petalColors = ['#e8737a','#f4a261','#d4849a','#e8a4b0','#f4b8c8','#e07070','#2c3e50','#c95a62'];

  function spawnPetals(x, y, flowerEl) {
    const count = 5 + Math.floor(Math.random() * 4);
    for (let i = 0; i < count; i++) {
      setTimeout(() => {
        const p = document.createElement('div');
        p.className = 'float-petal';
        const angle = (Math.random() * 360) * Math.PI / 180;
        const dist  = 40 + Math.random() * 70;
        const tx = Math.cos(angle) * dist;
        const ty = -(50 + Math.random() * 80);
        const tr = (Math.random() - 0.5) * 360;
        p.style.setProperty('--tx', tx + 'px');
        p.style.setProperty('--ty', ty + 'px');
        p.style.setProperty('--tr', tr + 'deg');
        p.style.left = (x + (Math.random()-0.5)*20) + 'px';
        p.style.top  = (y + (Math.random()-0.5)*20) + 'px';
        p.style.background = petalColors[Math.floor(Math.random()*petalColors.length)];
        p.style.transform = 'translate(-50%,-50%)';
        document.body.appendChild(p);
        setTimeout(() => p.remove(), 1900);
      }, i * 80);
    }
  }

  // ── Partículas de fondo (canvas) ──────────────────────────────────
  const canvas = document.getElementById('particles');
  const ctx    = canvas.getContext('2d');

  function resize() {
    canvas.width  = window.innerWidth;
    canvas.height = window.innerHeight;
  }
  resize();
  window.addEventListener('resize', resize);

  const particles = [];
  const PARTICLE_COUNT = 38;

  const pColors = ['#e8737a', '#f4a261', '#d4849a', '#e8a4b0', '#c9a090'];

  for (let i = 0; i < PARTICLE_COUNT; i++) {
    particles.push({
      x:     Math.random() * window.innerWidth,
      y:     Math.random() * window.innerHeight,
      r:     1 + Math.random() * 2.5,
      vx:    (Math.random() - 0.5) * 0.3,
      vy:    -0.1 - Math.random() * 0.25,
      alpha: 0.15 + Math.random() * 0.35,
      color: pColors[Math.floor(Math.random() * pColors.length)],
      life:  Math.random() * Math.PI * 2   // fase inicial aleatoria
    });
  }

  function animParticles() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    particles.forEach(p => {
      p.life += 0.012;
      p.x += p.vx + Math.sin(p.life) * 0.15;
      p.y += p.vy;
      if (p.y < -10) { p.y = canvas.height + 10; p.x = Math.random() * canvas.width; }

      ctx.beginPath();
      ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
      ctx.fillStyle = p.color;
      ctx.globalAlpha = p.alpha * (0.6 + 0.4 * Math.sin(p.life));
      ctx.fill();
    });
    ctx.globalAlpha = 1;
    requestAnimationFrame(animParticles);
  }
  animParticles();
</script>
</body>
</html>
